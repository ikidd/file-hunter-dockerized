# Build and push File Hunter image to GHCR when upstream (zen-logic/file-hunter) has new commits.
# Pattern similar to https://github.com/ikidd/cursor-linux-release — daily check, build only when needed,
# record Last Released On + Last Run on README.
name: Build and push image

on:
  push:
    branches: [main]
    paths-ignore:
      - "LATEST_BUILD.md"
      - "README.md"
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: build-and-push
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  UPSTREAM_REPO: https://github.com/zen-logic/file-hunter.git
  UPSTREAM_REPO_DISPLAY: zen-logic/file-hunter

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get upstream ref
        id: upstream
        run: |
          SHA=$(git ls-remote "$UPSTREAM_REPO" main | cut -f1)
          echo "ref=${SHA}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Read last built upstream SHA
        id: last
        run: |
          LAST=""
          if [ -f LATEST_BUILD.md ]; then
            LAST=$(grep '\*\*Full SHA\*\*' LATEST_BUILD.md | sed -n 's/.*`\([a-f0-9]\{40\}\)`.*/\1/p' | head -n1)
          fi
          echo "sha=${LAST}" >> $GITHUB_OUTPUT

      - name: Decide whether to build and push image
        id: gate
        env:
          EVENT: ${{ github.event_name }}
          CURRENT: ${{ steps.upstream.outputs.ref }}
          LAST_BUILT: ${{ steps.last.outputs.sha }}
        run: |
          SHOULD=false
          if [ "$EVENT" = "push" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            SHOULD=true
            echo "reason=trigger:${EVENT}" >> $GITHUB_OUTPUT
          elif [ -z "$LAST_BUILT" ] || [ "$CURRENT" != "$LAST_BUILT" ]; then
            SHOULD=true
            echo "reason=upstream-changed" >> $GITHUB_OUTPUT
          else
            echo "reason=upstream-unchanged" >> $GITHUB_OUTPUT
          fi
          echo "should_build=${SHOULD}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.gate.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: steps.gate.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image name
        if: steps.gate.outputs.should_build == 'true'
        id: meta
        run: |
          IMG=$(echo "${{ env.REGISTRY }}/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMG}" >> $GITHUB_OUTPUT

      - name: Build and push
        if: steps.gate.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.upstream.outputs.short_sha }}
          build-args: |
            REF=${{ steps.upstream.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.ref }}

      - name: Write LATEST_BUILD.md
        if: steps.gate.outputs.should_build == 'true'
        env:
          IMG: ${{ steps.meta.outputs.image }}
          SHORT: ${{ steps.upstream.outputs.short_sha }}
          FULL: ${{ steps.upstream.outputs.ref }}
          UPSTREAM_REPO_DISPLAY: ${{ env.UPSTREAM_REPO_DISPLAY }}
        run: |
          set -e
          COMMIT_URL="https://github.com/${UPSTREAM_REPO_DISPLAY}/commit/${FULL}"
          BUILT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          {
            echo "# Latest build"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Upstream commit** | [\`${SHORT}\`](${COMMIT_URL}) |"
            echo "| **Full SHA** | \`${FULL}\` |"
            echo "| **Image (latest)** | \`${IMG}:latest\` |"
            echo "| **Image (pinned)** | \`${IMG}:${SHORT}\` |"
            echo "| **Built** | ${BUILT} |"
            echo ""
            echo "To trigger a new build from this repo: **Actions → Build and push image → Run workflow**."
          } > LATEST_BUILD.md

      - name: Update README timestamps (like cursor-linux-release)
        env:
          SHOULD_BUILD: ${{ steps.gate.outputs.should_build }}
          IMG: ${{ steps.meta.outputs.image }}
          SHORT: ${{ steps.upstream.outputs.short_sha }}
        run: |
          set -e
          current_ts=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          if [ "$SHOULD_BUILD" = "true" ]; then
            release_ts="$current_ts"
          else
            release_ts=$(grep -oP '(?<=\*\*⏳ Last Released On\*\*: ).*' README.md 2>/dev/null | head -n1 || true)
            if [ -z "$release_ts" ]; then
              release_ts="—"
            fi
          fi

          awk '
            /^## 📅 Build status$/ { skip=1; next }
            skip && /^## / { skip=0; print; next }
            skip { next }
            { print }
          ' README.md > README.tmp && mv README.tmp README.md

          {
            echo ""
            echo "## 📅 Build status"
            echo ""
            echo "- **⏳ Last Released On**: ${release_ts}"
            echo "- **🔄 Last Run**: ${current_ts}"
            if [ "$SHOULD_BUILD" = "true" ] && [ -n "$SHORT" ]; then
              echo "- **📦 Upstream in image**: \`${SHORT}\` (\`${IMG}:${SHORT}\`)"
            fi
          } >> README.md

      - name: Commit and push documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SHOULD_BUILD: ${{ steps.gate.outputs.should_build }}
          UPSTREAM_SHORT: ${{ steps.upstream.outputs.short_sha }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" main
          # README/LATEST_BUILD were edited above; rebase requires a clean tree or --autostash
          git rebase --autostash origin/main
          git add README.md
          if [ -f LATEST_BUILD.md ]; then
            git add LATEST_BUILD.md
          fi
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            msg="docs: update build status [workflow]"
            if [ "$SHOULD_BUILD" = "true" ]; then
              msg="chore: image for upstream ${UPSTREAM_SHORT} + README status [workflow]"
            fi
            git commit -m "$msg"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          fi
