# Build and push File Hunter Docker image to GHCR.
# Runs on push to main and daily to pick up upstream (zen-logic/file-hunter) updates.
name: Build and push image

on:
  push:
    branches: [main]
  schedule:
    # Daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

concurrency:
  group: build-and-push
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  UPSTREAM_REPO: https://github.com/zen-logic/file-hunter.git
  UPSTREAM_REPO_DISPLAY: zen-logic/file-hunter

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get upstream ref
        id: upstream
        run: |
          SHA=$(git ls-remote "$UPSTREAM_REPO" main | cut -f1)
          echo "ref=${SHA}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image name
        id: meta
        run: |
          IMG=$(echo "${{ env.REGISTRY }}/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMG}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.upstream.outputs.short_sha }}
          build-args: |
            REF=${{ steps.upstream.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.ref }}

      - name: Update LATEST_BUILD and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" main && git rebase origin/main
          IMG="${{ steps.meta.outputs.image }}"
          SHORT="${{ steps.upstream.outputs.short_sha }}"
          FULL="${{ steps.upstream.outputs.ref }}"
          COMMIT_URL="https://github.com/${{ env.UPSTREAM_REPO_DISPLAY }}/commit/${FULL}"
          cat > LATEST_BUILD.md << EOF
          # Latest build

          | Field | Value |
          |-------|-------|
          | **Upstream commit** | [\`${SHORT}\`](${COMMIT_URL}) |
          | **Full SHA** | \`${FULL}\` |
          | **Image (latest)** | \`${IMG}:latest\` |
          | **Image (pinned)** | \`${IMG}:${SHORT}\` |
          | **Built** | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |

          To trigger a new build from this repo: **Actions → Build and push image → Run workflow**.
          EOF
          git add LATEST_BUILD.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: update LATEST_BUILD to upstream ${SHORT}"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
