# Build and push File Hunter image to GHCR when upstream (zen-logic/file-hunter)
# publishes a new GitHub release.
# Pattern similar to ikidd/cursor-linux-release: daily check, build only when needed,
# and update README status stamps.
name: Build and push image

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [upstream_release]

concurrency:
  group: build-and-push
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  UPSTREAM_REPO: https://github.com/zen-logic/file-hunter.git
  UPSTREAM_REPO_DISPLAY: zen-logic/file-hunter

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get upstream latest release and commit
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_TAG: ${{ github.event.client_payload.tag }}
          PAYLOAD_SHA: ${{ github.event.client_payload.sha }}
          PAYLOAD_URL: ${{ github.event.client_payload.release_url }}
          PAYLOAD_PUBLISHED: ${{ github.event.client_payload.published_at }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "repository_dispatch" ] && [ -n "${PAYLOAD_TAG}" ]; then
            TAG="${PAYLOAD_TAG}"
            URL="${PAYLOAD_URL:-https://github.com/${UPSTREAM_REPO_DISPLAY}/releases/tag/${TAG}}"
            PUBLISHED_AT="${PAYLOAD_PUBLISHED:-}"
            SHA="${PAYLOAD_SHA:-}"
          else
            RELEASE_JSON=$(gh api "repos/${UPSTREAM_REPO_DISPLAY}/releases/latest")
            TAG=$(printf '%s' "$RELEASE_JSON" | jq -r '.tag_name')
            URL=$(printf '%s' "$RELEASE_JSON" | jq -r '.html_url')
            PUBLISHED_AT=$(printf '%s' "$RELEASE_JSON" | jq -r '.published_at // empty')
            SHA=""
          fi

          if [ -z "$SHA" ]; then
            SHA=$(git ls-remote "$UPSTREAM_REPO" "refs/tags/${TAG}^{}" | awk '{print $1}')
            if [ -z "$SHA" ]; then
              SHA=$(git ls-remote "$UPSTREAM_REPO" "refs/tags/${TAG}" | awk '{print $1}')
            fi
          fi
          if [ -z "$SHA" ]; then
            echo "Failed to resolve commit SHA for upstream release tag: ${TAG}"
            exit 1
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "release_url=${URL}" >> $GITHUB_OUTPUT
          echo "published_at=${PUBLISHED_AT}" >> $GITHUB_OUTPUT
          echo "ref=${SHA}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Read last built upstream release and SHA
        id: last
        run: |
          LAST_TAG=""
          LAST=""
          if [ -f LATEST_BUILD.md ]; then
            LAST_TAG=$(grep '\*\*Upstream release\*\*' LATEST_BUILD.md | sed -n 's/.*`\([^`]*\)`.*/\1/p' | head -n1)
            LAST=$(grep '\*\*Full SHA\*\*' LATEST_BUILD.md | sed -n 's/.*`\([a-f0-9]\{40\}\)`.*/\1/p' | head -n1)
          fi
          echo "tag=${LAST_TAG}" >> $GITHUB_OUTPUT
          echo "sha=${LAST}" >> $GITHUB_OUTPUT

      - name: Decide whether to build and push image
        id: gate
        env:
          CURRENT_TAG: ${{ steps.upstream.outputs.tag }}
          CURRENT: ${{ steps.upstream.outputs.ref }}
          LAST_TAG: ${{ steps.last.outputs.tag }}
          LAST_BUILT: ${{ steps.last.outputs.sha }}
        run: |
          SHOULD=false
          # Build only when upstream publishes a new release.
          if [ -n "$LAST_TAG" ] && [ "$CURRENT_TAG" != "$LAST_TAG" ]; then
            SHOULD=true
            echo "reason=upstream-release-tag-changed" >> $GITHUB_OUTPUT
          elif [ -z "$LAST_TAG" ] && [ -z "$LAST_BUILT" ]; then
            SHOULD=true
            echo "reason=no-previous-build-record" >> $GITHUB_OUTPUT
          elif [ -z "$LAST_BUILT" ] || [ "$CURRENT" != "$LAST_BUILT" ]; then
            SHOULD=true
            echo "reason=upstream-release-commit-changed" >> $GITHUB_OUTPUT
          else
            echo "reason=upstream-release-unchanged" >> $GITHUB_OUTPUT
          fi
          echo "should_build=${SHOULD}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.gate.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: steps.gate.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image name
        if: steps.gate.outputs.should_build == 'true'
        id: meta
        run: |
          IMG=$(echo "${{ env.REGISTRY }}/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMG}" >> $GITHUB_OUTPUT

      - name: Derive version from tag
        if: steps.gate.outputs.should_build == 'true'
        id: version
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push
        if: steps.gate.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ steps.version.outputs.version }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.ref }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Write LATEST_BUILD.md
        if: steps.gate.outputs.should_build == 'true'
        env:
          IMG: ${{ steps.meta.outputs.image }}
          TAG: ${{ steps.upstream.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_URL: ${{ steps.upstream.outputs.release_url }}
          PUBLISHED_AT: ${{ steps.upstream.outputs.published_at }}
          SHORT: ${{ steps.upstream.outputs.short_sha }}
          FULL: ${{ steps.upstream.outputs.ref }}
          UPSTREAM_REPO_DISPLAY: ${{ env.UPSTREAM_REPO_DISPLAY }}
        run: |
          set -e
          COMMIT_URL="https://github.com/${UPSTREAM_REPO_DISPLAY}/commit/${FULL}"
          BUILT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          {
            echo "# Latest build"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Upstream release** | [\`${TAG}\`](${RELEASE_URL}) |"
            echo "| **Release published** | ${PUBLISHED_AT} |"
            echo "| **Upstream commit** | [\`${SHORT}\`](${COMMIT_URL}) |"
            echo "| **Full SHA** | \`${FULL}\` |"
            echo "| **Image (latest)** | \`${IMG}:latest\` |"
            echo "| **Image (pinned)** | \`${IMG}:${VERSION}\` |"
            echo "| **Built** | ${BUILT} |"
          } > LATEST_BUILD.md

      - name: Update README timestamps (like cursor-linux-release)
        env:
          SHOULD_BUILD: ${{ steps.gate.outputs.should_build }}
          REASON: ${{ steps.gate.outputs.reason }}
          IMG: ${{ steps.meta.outputs.image }}
          RELEASE_TAG: ${{ steps.upstream.outputs.tag }}
          RELEASE_URL: ${{ steps.upstream.outputs.release_url }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -e
          current_ts=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          if [ "$SHOULD_BUILD" = "true" ]; then
            release_ts="$current_ts"
          else
            release_ts=$(grep -oP '(?<=\*\*⏳ Last Released On\*\*: ).*' README.md 2>/dev/null | head -n1 || true)
            if [ -z "$release_ts" ]; then
              release_ts="—"
            fi
          fi

          awk '
            /^## 📅 Build status$/ { skip=1; next }
            skip && /^## / { skip=0; print; next }
            skip { next }
            { print }
          ' README.md > README.tmp && mv README.tmp README.md

          {
            echo ""
            echo "## 📅 Build status"
            echo ""
            echo "- **⏳ Last Released On**: ${release_ts}"
            echo "- **🔄 Last Run**: ${current_ts}"
            echo "- **🏷️ Upstream Latest Release**: [\`${RELEASE_TAG}\`](${RELEASE_URL})"
            echo "- **🧭 Decision**: ${REASON}"
            if [ "$SHOULD_BUILD" = "true" ] && [ -n "$VERSION" ]; then
              echo "- **📦 Upstream in image**: \`${VERSION}\` (\`${IMG}:${VERSION}\`)"
            fi
          } >> README.md

      - name: Commit and push documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SHOULD_BUILD: ${{ steps.gate.outputs.should_build }}
          UPSTREAM_TAG: ${{ steps.upstream.outputs.tag }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" main
          git rebase --autostash origin/main
          git add README.md
          if [ -f LATEST_BUILD.md ]; then
            git add LATEST_BUILD.md
          fi
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            msg="docs: update build status [workflow]"
            if [ "$SHOULD_BUILD" = "true" ]; then
              msg="chore: image for upstream ${UPSTREAM_TAG} + README status [workflow]"
            fi
            git commit -m "$msg"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          fi
